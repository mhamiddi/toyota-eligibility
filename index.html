<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Toyota Malaysia — Semak Kelayakan</title>
<meta name="description" content="Semak kelayakan loan kereta Toyota Malaysia. HP calculator, model prices, variants.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#EB0A1E;--red-dark:#B80A1E;--grad:linear-gradient(135deg,#EB0A1E,#CC0013);--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--text2:#6e6e73;--green:#34c759;--orange:#ff9500}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
/* Header */
.header{background:var(--grad);color:#fff;padding:48px 20px 32px;text-align:center;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,0.08) 0%,transparent 60%);pointer-events:none}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;position:relative;z-index:1}
.header p{font-size:14px;opacity:.8;margin-top:6px;position:relative;z-index:1;line-height:1.4}
.header .logo{width:60px;height:60px;margin:0 auto 12px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;z-index:1}
/* Toggle BM/EN */
.lang-toggle{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-weight:500;z-index:2}
.lang-toggle:active{transform:scale(.95)}
/* Calculator */
.calc{background:var(--card);margin:-20px 16px 0;border-radius:16px;padding:20px;box-shadow:0 4px 24px rgba(0,0,0,0.06);position:relative;z-index:2}
.calc label{font-size:13px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.calc .input-group{position:relative;margin-bottom:14px}
.calc .input-group .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:600;color:var(--text2);pointer-events:none}
.calc input,.calc select{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid #e5e5ea;border-radius:12px;background:#fafafa;outline:none;transition:border-color .2s;appearance:none;-webkit-appearance:none}
.calc input:focus,.calc select:focus{border-color:var(--red);background:#fff}
.calc input[type=number]{padding-left:32px}
.calc .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
/* Result summary */
.summary{background:var(--grad);margin:16px 16px 0;border-radius:16px;padding:16px 20px;color:#fff;display:none}
.summary.active{display:block;animation:fadeUp .3s ease}
.summary .big{font-size:32px;font-weight:700;letter-spacing:-1px}
.summary .big .currency{font-size:18px;font-weight:400;opacity:.8}
.summary .details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.summary .detail-item{text-align:center}
.summary .detail-item .num{font-size:18px;font-weight:600}
.summary .detail-item .lbl{font-size:11px;opacity:.7;margin-top:2px}
/* Filter chips */
.filters{display:flex;gap:8px;padding:12px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid #e5e5ea;background:var(--card);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.chip.active{background:var(--red);color:#fff;border-color:var(--red)}
.chip:active{transform:scale(.95)}
.chip-count{font-size:11px;opacity:.6;margin-left:4px}
/* Model grid */
.models{padding:8px 16px 100px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.model-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.04);transition:all .2s;cursor:pointer;position:relative}
.model-card:active{transform:scale(.97)}
.model-card .img-wrap{width:100%;aspect-ratio:16/10;background:#f0f0f5;position:relative;overflow:hidden}
.model-card .img-wrap img{width:100%;height:100%;object-fit:cover}
.model-card .img-wrap .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.15;font-weight:800;color:var(--red)}
.model-card .model-name{font-size:14px;font-weight:600;padding:8px 12px 2px}
.model-card .model-type{font-size:11px;color:var(--text2);padding:0 12px}
.model-card .model-price{font-size:15px;font-weight:700;padding:4px 12px 8px;color:var(--red)}
.model-card .model-price .from{font-size:11px;font-weight:400;color:var(--text2)}
.model-card .badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600;color:#fff}
.badge-lulus{background:var(--green)}
.badge-gagal{background:var(--orange)}
.badge-info{background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
/* Detail panel */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;animation:fadeIn .2s}
.detail-overlay.active{display:block}
.detail-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;z-index:101;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding:20px}
.detail-panel.active{transform:translateY(0)}
.detail-panel .handle{width:36px;height:4px;background:#e5e5ea;border-radius:2px;margin:0 auto 16px}
.detail-panel .d-header{display:flex;gap:12px;margin-bottom:16px}
.detail-panel .d-img{width:120px;height:80px;border-radius:10px;background:#f0f0f5;flex-shrink:0;overflow:hidden}
.detail-panel .d-img img{width:100%;height:100%;object-fit:cover}
.detail-panel .d-info{flex:1}
.detail-panel .d-name{font-size:18px;font-weight:700}
.detail-panel .d-type{font-size:13px;color:var(--text2);margin-top:2px}
.detail-panel .d-price{font-size:22px;font-weight:700;color:var(--red);margin-top:4px}
.detail-panel .d-price .from{font-size:12px;font-weight:400;color:var(--text2)}
.detail-panel .d-status{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:600;display:inline-block;margin-top:6px}
/* Variants */
.variants{list-style:none}
.variants li{padding:12px 0;border-bottom:1px solid #f0f0f5;display:flex;justify-content:space-between;align-items:center}
.variants li:last-child{border-bottom:none}
.variants .v-name{font-size:14px;font-weight:500}
.variants .v-price{font-size:14px;font-weight:600;color:var(--red)}
.variants .v-status{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500}
/* WhatsApp */
.whatsapp-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#25D366;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;transition:opacity .2s;text-decoration:none}
.whatsapp-btn:active{opacity:.8}
/* No results */
.no-results{text-align:center;padding:40px 20px;color:var(--text2);display:none;grid-column:1/-1}
.no-results.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:400px){.models{grid-template-columns:1fr}}
</style>
</head>

<!-- Filters -->
<div class="filters">

  <div class="chip" onclick="setFilter(this,'pickup')">Pickup</div>

  <div class="chip" onclick="setFilter(this,'coupe')">Coupe</div>
  <div class="chip" onclick="setFilter(this,'van')">Van</div>
  <div class="chip" onclick="setFilter(this,'ev')">EV / HEV</div>
</div>

<!-- Model Grid -->
<div class="models" id="models"></div>

<!-- Detail Panel -->
<div class="detail-overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="panel">
  <div class="handle"></div>
  <div class="d-header">
    <div class="d-img"><img id="dImg" src="" alt=""></div>

      <div class="d-name" id="dName"></div>

      <div class="d-price"><span class="from">From </span>RM<span id="dPrice">0</span></div>

    </div>
  </div>
  <h3 style="font-size:14px;color:var(--text2);margin-bottom:8px" data-en="Available Variants" data-bm="Varian Tersedia">Varian Tersedia</h3>
  <ul class="variants" id="variants"></ul>

</div>

// ── Model Data ──────────────────────────────────────────────────
const MODELS = [
  {id:'yaris', name:'Yaris', type:'Hatchback', cat:'hatchback', price:88000, img:'https://www.toyota.com.my/content/dam/malaysia/models/yaris/overview/yaris-overview-new-v3.jpg', variants:[{name:'Yaris 1.5E',price:88000},{name:'Yaris 1.5G',price:94800},{name:'Yaris 1.5S',price:99800}]},

  {id:'gr-corolla', name:'GR Corolla', type:'Hatchback', cat:'hatchback|performance', price:368950, img:'https://www.toyota.com.my/content/dam/malaysia/models/gr-corolla/explore-thumbnails/toyota-gr-corolla-navi-v2.png', variants:[{name:'GR Corolla 1.6T',price:368950}]},

// ── State ─────────────────────────────────────────────────────────
let lang = 'bm';
let filter = 'all';

// ── Calculator ───────────────────────────────────────────────────
function calcAll() {
  const salary = parseFloat(document.getElementById('salary').value) || 0;
  const years = parseInt(document.getElementById('tenure').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;
  const dpPct = parseInt(document.getElementById('dp').value) / 100;

  const maxMonthly = salary * 0.3;
  const totalMonths = years * 12;
  const flatRate = rate * years;
  // maxLoan = maxMonthly * totalMonths / (1 + flatRate)
  const maxLoan = maxMonthly * totalMonths / (1 + flatRate);
  const totalLoan = maxLoan + (maxLoan * flatRate);
  const downPayment = maxLoan * dpPct / (1 - dpPct);

  document.getElementById('maxLoan').textContent = Math.round(maxLoan).toLocaleString();
  document.getElementById('dMonthly').textContent = 'RM' + Math.round(maxMonthly).toLocaleString();
  document.getElementById('dDown').textContent = 'RM' + Math.round(downPayment).toLocaleString();
  document.getElementById('dTotal').textContent = 'RM' + Math.round(totalLoan).toLocaleString();

  document.getElementById('summary').classList.add('active');
  renderModels(salary, years, rate, dpPct);
}

// ── Eligibility ──────────────────────────────────────────────────
function calcEligibility(price, salary, years, rate, dpPct) {
  const dp = price * dpPct;
  const loanAmount = price - dp;
  const totalInterest = loanAmount * rate * years;
  const monthly = (loanAmount + totalInterest) / (years * 12);
  const eligible = monthly <= salary * 0.3;
  return { monthly, eligible, dp, total: loanAmount + totalInterest };
}

// ── Render Models ────────────────────────────────────────────────
function renderModels(salary, years, rate, dpPct) {
  const grid = document.getElementById('models');
  let html = '';
  let countLulus = 0, countGagal = 0;

  MODELS.forEach((m, i) => {
    const result = calcEligibility(m.price, salary, years, rate, dpPct);
    const status = result.eligible ? 'lulus' : 'gagal';
    const label = result.eligible ? (lang==='bm'?'✅ Lulus':'✅ Eligible') : (lang==='bm'?'❌ Gagal':'❌ Not Eligible');
    if (result.eligible) countLulus++; else countGagal++;

    let show = true;
    if (filter === 'lulus') show = result.eligible;
    else if (filter === 'gagal') show = !result.eligible;
    else if (filter !== 'all') {
      const cats = m.cat.split('|');
      show = cats.includes(filter);
    }

    if (!show) return;

    html += `
    <div class="model-card" onclick="openDetail(${i})" data-status="${status}">
      <div class="img-wrap">
        <img src="${m.img}" alt="${m.name}" onerror="this.parentElement.querySelector('.fallback').style.display='flex';this.style.display='none'" loading="lazy">
        <div class="fallback" style="display:none">${m.name[0]}</div>
        <div class="badge badge-${status}">${label}</div>
      </div>
      <div class="model-name">${m.name}</div>
      <div class="model-type">${m.type}</div>
      <div class="model-price"><span class="from">from </span>RM${m.price.toLocaleString()}</div>
    </div>`;
  });

  if (!html) html = '<div class="no-results active">' + (lang==='bm'?'Tiada model yang sepadan':'No matching models') + '</div>';
  grid.innerHTML = html;

  document.getElementById('countLulus').textContent = countLulus;
  document.getElementById('countGagal').textContent = countGagal;
}

// ── Detail Panel ─────────────────────────────────────────────────
function openDetail(idx) {
  const m = MODELS[idx];
  const salary = parseFloat(document.getElementById('salary').value) || 0;
  const years = parseInt(document.getElementById('tenure').value);
  const rate = parseFloat(document.getElementById('rate').value) / 100;
  const dpPct = parseInt(document.getElementById('dp').value) / 100;
  const result = calcEligibility(m.price, salary, years, rate, dpPct);

  document.getElementById('dImg').src = m.img;
  document.getElementById('dName').textContent = m.name;
  document.getElementById('dType').textContent = m.type;
  document.getElementById('dPrice').textContent = m.price.toLocaleString();
  
  const statusEl = document.getElementById('dStatus');
  if (result.eligible) {
    statusEl.textContent = lang==='bm'?'✅ Lulus — RM' + Math.round(result.monthly).toLocaleString() + '/bln':'✅ Eligible — RM' + Math.round(result.monthly).toLocaleString() + '/mo';
    statusEl.style.background = '#34c75920';
    statusEl.style.color = '#34c759';
  } else {
    statusEl.textContent = lang==='bm'?'❌ Gagal — RM' + Math.round(result.monthly).toLocaleString() + '/bln (maks RM' + Math.round(salary*0.3).toLocaleString() + ')':'❌ Not Eligible — RM' + Math.round(result.monthly).toLocaleString() + '/mo (max RM' + Math.round(salary*0.3).toLocaleString() + ')';
    statusEl.style.background = '#ff950020';
    statusEl.style.color = '#ff9500';
  }

  // Variants
  let vHtml = '';
  m.variants.forEach(v => {
    const vResult = calcEligibility(v.price, salary, years, rate, dpPct);
    const vStatus = vResult.eligible ? (lang==='bm'?'✅ Lulus':'✅ E') : (lang==='bm'?'❌ Gagal':'❌ N');
    vHtml += `<li><span class="v-name">${v.name}</span><span><span class="v-price">RM${v.price.toLocaleString()}</span> <span class="v-status" style="background:${vResult.eligible?'#34c75920':'#ff950020'};color:${vResult.eligible?'#34c759':'#ff9500'}">${vStatus}</span></span></li>`;
  });
  document.getElementById('variants').innerHTML = vHtml;

  document.getElementById('overlay').classList.add('active');
  document.getElementById('panel').classList.add('active');
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('panel').classList.remove('active');
}

// ── Filters ──────────────────────────────────────────────────────
function setFilter(el, f) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filter = f;
  calcAll();
}

// ── WhatsApp ─────────────────────────────────────────────────────
function sendWA() {
  const name = document.getElementById('dName').textContent;
  const price = document.getElementById('dPrice').textContent;
  const salary = document.getElementById('salary').value;
  const msg = encodeURIComponent(`Hi, saya nak inquiry Toyota ${name} (RM${price}). Pendapatan saya RM${salary}/bulan. Boleh bantu?`);
  window.open(`https://wa.me/60138077961?text=${msg}`, '_blank');
}

// ── Language Toggle ──────────────────────────────────────────────
function toggleLang() {
  lang = lang === 'bm' ? 'en' : 'bm';
  document.querySelector('.lang-toggle').textContent = lang === 'bm' ? 'EN' : 'BM';
  document.querySelectorAll('[data-bm],[data-en]').forEach(el => {
    if (el.tagName === 'INPUT' || el.tagName === 'SELECT') return;
    el.textContent = el.getAttribute('data-' + lang) || el.textContent;
  });
  calcAll();
}

// ── Init ─────────────────────────────────────────────────────────
calcAll();
</script>
</body>
